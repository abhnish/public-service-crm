name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha

  deploy-database:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run database migrations
        run: |
          echo "Running database migrations for ${{ inputs.environment }}"
          # This would run Prisma migrations against the target database
          # In production, you might want to use a more robust migration strategy
          
      - name: Seed database (optional)
        run: |
          echo "Seeding database for ${{ inputs.environment }}"
          # Only run in staging or if explicitly needed
          if [ "${{ inputs.environment }}" = "staging" ]; then
            # Run seed script
            cd backend && npx prisma db seed
          fi

  deploy-services:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [deploy-backend, deploy-frontend, deploy-database]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          echo "Deploying to ${{ inputs.environment }}"
          
          # Deploy backend
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceId": "srv-${{ env.IMAGE_NAME }}-backend",
              "imageUrl": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}",
              "envVars": [
                {"key": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}"},
                {"key": "JWT_SECRET", "value": "${{ secrets.JWT_SECRET }}"},
                {"key": "NODE_ENV", "value": "${{ inputs.environment }}"},
                {"key": "REDIS_URL", "value": "${{ secrets.REDIS_URL }}"}
              ]
            }' \
            https://api.render.com/v1/services
            
          # Deploy frontend
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceId": "srv-${{ env.IMAGE_NAME }}-frontend",
              "imageUrl": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}",
              "envVars": [
                {"key": "VITE_API_URL", "value": "${{ secrets.API_URL }}"}
              ]
            }' \
            https://api.render.com/v1/services
            
          # Deploy Redis (if needed)
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "serviceId": "srv-${{ env.IMAGE_NAME }}-redis",
              "imageUrl": "redis:7",
              "envVars": [
                {"key": "REDIS_PASSWORD", "value": "${{ secrets.REDIS_PASSWORD }}"}
              ]
            }' \
            https://api.render.com/v1/services
            
          echo "Deployment completed for ${{ inputs.environment }}"

  health-check:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: deploy-services
    
    steps:
      - name: Wait for deployment
        run: |
          echo "Waiting for services to be healthy..."
          sleep 60
          
      - name: Health check
        run: |
          echo "Checking service health..."
          
          # Check backend health
          if [ "${{ inputs.environment }}" = "production" ]; then
            BACKEND_URL="https://${{ secrets.PROD_BACKEND_URL }}"
          else
            BACKEND_URL="https://${{ secrets.STAGING_BACKEND_URL }}"
          fi
          
          curl -f "$BACKEND_URL/api/health" || echo "Backend health check failed"
          
          # Check frontend health
          if [ "${{ inputs.environment }}" = "production" ]; then
            FRONTEND_URL="https://${{ secrets.PROD_FRONTEND_URL }}"
          else
            FRONTEND_URL="https://${{ secrets.STAGING_FRONTEND_URL }}"
          fi
          
          curl -f "$FRONTEND_URL" || echo "Frontend health check failed"

  notify:
    runs-on: ubuntu-latest
    needs: [health-check]
    if: failure()
    
    steps:
      - name: Notify deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const { GITHUB_TOKEN, GITHUB_REPOSITORY } = process.env;
            
            // Create comment on PR or issue
            if (context.payload.pull_request) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `🚀 **Deployment Status:** ${context.workflow} ${context.job}
                
                **Environment:** ${{ inputs.environment }}
                **Status:** ❌ Failed
                
                Please check the logs and try again.`
              });
            } else {
              // Create release or update status
              console.log('Deployment completed successfully');
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
